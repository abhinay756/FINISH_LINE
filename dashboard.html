<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h2>FINISH-LINE Dashboard</h2>
</div>

<div class="dashboard-container">

    <div class="card">
        <h3>User Info</h3>
        <p>Name: <span class="null">null</span></p>
        <p>Email: <span class="null">null</span></p>
        <p>Skills: <span class="null">null</span></p>
    </div>

    <div class="card">
        <h3>Projects</h3>
        <p>Active Projects: <span class="null">null</span></p>
        <p>Completed Projects: <span class="null">null</span></p>
    </div>

    <div class="card">
        <h3>Tasks</h3>
        <p>In Progress: <span class="null">null</span></p>
        <p>Completed: <span class="null">null</span></p>
    </div>

    <div class="card">
        <h3>Payments</h3>
        <p>Balance: <span class="null">₹ null</span></p>
        <p>Status: <span class="null">Pending</span></p>
    </div>

    <button class="logout-btn" onclick="logoutUser()">Logout</button>

</div>

<script src="script.js"></script>
</body>
</html>
